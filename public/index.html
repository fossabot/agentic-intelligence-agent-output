<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intelligence Analyst Agent</title>
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1d27;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid #2a2d3a;
    }

    header h1 { font-size: 1.4rem; color: #ffffff; }

    #status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    #status-dot.connected { background: #22c55e; }
    #status-dot.receiving { background: #f59e0b; animation: pulse 0.5s; }
    #status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    #timestamp {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 12px;
    }

    #output-container {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 28px;
      min-height: 300px;
      transition: border-color 0.3s;
    }

    #output-container.updating { border-color: #f59e0b; }

    #output-content { line-height: 1.7; }

    #output-content h1,
    #output-content h2,
    #output-content h3 {
      color: #ffffff;
      margin: 16px 0 8px;
    }

    #output-content p { margin-bottom: 12px; color: #c0c0c0; }

    #output-content ul,
    #output-content ol {
      padding-left: 24px;
      margin-bottom: 12px;
    }

    #output-content li { margin-bottom: 6px; color: #c0c0c0; }

    #output-content code {
      background: #2a2d3a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
      color: #a78bfa;
    }

    #output-content pre {
      background: #2a2d3a;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    #output-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
    }

    #output-content th,
    #output-content td {
      border: 1px solid #2a2d3a;
      padding: 8px 12px;
      text-align: left;
    }

    #output-content th { background: #2a2d3a; color: #fff; }

    .json-label {
      color: #a78bfa;
      font-weight: bold;
    }

    .json-value {
      color: #c0c0c0;
      margin-left: 8px;
    }

    .json-section {
      margin-bottom: 16px;
    }

    .json-nested {
      padding-left: 16px;
      border-left: 2px solid #2a2d3a;
      margin-top: 8px;
    }

    .history-section { margin-top: 24px; }

    .history-section h3 {
      color: #888;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .history-item {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>

  <header>
    <h1>🛡️🤖 Agentic Intelligence Agent's Live Output 🔎📊</h1>
    <div id="status-indicator">
      <div id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </header>

  <div id="timestamp">Waiting for first update...</div>

  <div id="output-container">
    <div id="output-content">
      <p style="color:#444; text-align:center; padding:60px 0">
        ⏳ Waiting for agent output...
      </p>
    </div>
  </div>

  <div class="history-section">
    <h3>Previous Updates</h3>
    <div id="history-list"></div>
  </div>

  <script>
    // ============================================================
    const ably = new Ably.Realtime({
      authUrl: '/api/auth'
    });

    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const outputContent = document.getElementById('output-content');
    const outputContainer = document.getElementById('output-container');
    const timestampEl = document.getElementById('timestamp');
    const historyList = document.getElementById('history-list');
    let updateHistory = [];

    // Initialize Ably
    const channel = ably.channels.get('agent-channel');

    // Connection status handlers
    ably.connection.on('connected', () => {
      statusDot.className = 'connected';
      statusText.textContent = 'Connected — Listening for updates';
    });

    ably.connection.on('disconnected', () => {
      statusDot.className = '';
      statusText.textContent = 'Disconnected';
    });

    ably.connection.on('failed', () => {
      statusDot.className = 'error';
      statusText.textContent = 'Connection error';
    });

    // Render JSON object as formatted HTML
    function renderJSON(data) {
      if (typeof data !== 'object' || data === null) {
        return `<p>${data}</p>`;
      }

      let html = '';

      for (const [key, value] of Object.entries(data)) {
        // Format key to Title Case
        const label = key
          .replace(/_/g, ' ')
          .replace(/([A-Z])/g, ' $1')
          .replace(/^./, str => str.toUpperCase());

        if (Array.isArray(value)) {
          // Render arrays as bullet lists
          html += `
            <div class="json-section">
              <span class="json-label">${label}:</span>
              <ul style="margin-top: 8px;">
                ${value.map(item =>
                  typeof item === 'object'
                    ? `<li><div class="json-nested">${renderJSON(item)}</div></li>`
                    : `<li>${item}</li>`
                ).join('')}
              </ul>
            </div>`;
        } else if (typeof value === 'object' && value !== null) {
          // Render nested objects recursively
          html += `
            <div class="json-section">
              <span class="json-label">${label}:</span>
              <div class="json-nested">
                ${renderJSON(value)}
              </div>
            </div>`;
        } else {
          // Render simple key/value pairs
          html += `
            <div class="json-section">
              <span class="json-label">${label}:</span>
              <span class="json-value">${value}</span>
            </div>`;
        }
      }

      return html;
    }

    // Listen for agent updates from Ably
    channel.subscribe('agent-update', (message) => {
      const data = message.data;

      statusDot.className = 'receiving';
      statusText.textContent = 'Receiving update...';
      outputContainer.classList.add('updating');

      // Save current content to history
      if (outputContent.innerText.trim() &&
          !outputContent.innerText.includes('Waiting')) {
        updateHistory.unshift({
          timestamp: timestampEl.textContent,
          preview: outputContent.innerText.substring(0, 80) + '...'
        });
        if (updateHistory.length > 5) updateHistory.pop();
        renderHistory();
      }

      setTimeout(() => {
        if (data.type === 'html') {
          // Sanitize and inject HTML directly
          outputContent.innerHTML = DOMPurify.sanitize(data.content);

        } else if (data.type === 'json') {
          try {
            // Handle if content is already an object or still a string
            const parsed = typeof data.content === 'object'
              ? data.content
              : JSON.parse(data.content);

            outputContent.innerHTML = renderJSON(parsed);
          } catch (e) {
            // Fallback to raw display if parsing fails
            outputContent.innerHTML = `<pre><code>${data.content}</code></pre>`;
          }
        }

        const d = new Date(data.timestamp);
        timestampEl.textContent =
          `Last updated: ${d.toLocaleTimeString()} on ${d.toLocaleDateString()}`;

        statusDot.className = 'connected';
        statusText.textContent = 'Connected — Listening for updates';
        outputContainer.classList.remove('updating');
      }, 300);
    });

    function renderHistory() {
      historyList.innerHTML = updateHistory.map(item => `
        <div class="history-item">
          <strong>${item.timestamp}</strong><br/>
          ${item.preview}
        </div>
      `).join('');
    }
  </script>

</body>
</html>
