<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intelligence Analyst Agent</title>
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    /* ============ PASSWORD SCREEN ============ */
    #password-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #password-screen.hidden { display: none; }

    .password-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .password-card h2 {
      color: #ffffff;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .password-card p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .password-input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .password-input:focus { border-color: #a78bfa; }

    .password-btn {
      width: 100%;
      padding: 12px;
      background: #a78bfa;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .password-btn:hover { background: #9061f9; }

    .password-error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .password-error.visible { display: block; }

    /* ============ MAIN APP ============ */
    #app { display: none; }
    #app.visible { display: block; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1d27;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid #2a2d3a;
    }

    header h1 { font-size: 1.4rem; color: #ffffff; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #logout-btn {
      background: none;
      border: 1px solid #2a2d3a;
      color: #666;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    #logout-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    #status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    #status-dot.connected { background: #22c55e; }
    #status-dot.receiving { background: #f59e0b; animation: pulse 0.5s; }
    #status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    #timestamp {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 12px;
    }

    #output-container {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 28px;
      min-height: 300px;
      transition: border-color 0.3s;
    }

    #output-container.updating { border-color: #f59e0b; }

    .section-card {
      background: #12151f;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .exec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .exec-meta {
      background: #1a1d27;
      border-radius: 8px;
      padding: 12px;
    }

    .exec-meta-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .exec-meta-value {
      font-size: 0.9rem;
      color: #c0c0c0;
    }

    .overview-text {
      color: #c0c0c0;
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .priority-list { list-style: none; padding: 0; }

    .priority-item {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.9rem;
      border-left: 3px solid #555;
      background: #1a1d27;
      color: #c0c0c0;
    }

    .priority-item.critical {
      border-left-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    .priority-item.high {
      border-left-color: #f59e0b;
      background: rgba(245, 158, 11, 0.05);
    }

    .priority-item.medium {
      border-left-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
    }

    .priority-item.low {
      border-left-color: #22c55e;
      background: rgba(34, 197, 94, 0.05);
    }

    .risk-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .risk-card:last-child { margin-bottom: 0; }

    .risk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .risk-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      flex: 1;
    }

    .rating-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .rating-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .rating-high {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      border: 1px solid #f59e0b;
    }

    .rating-medium {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      border: 1px solid #3b82f6;
    }

    .rating-low {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    .field-label {
      font-size: 0.75rem;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      margin-top: 14px;
      font-weight: 600;
    }

    .field-value {
      color: #c0c0c0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .field-list { list-style: none; padding: 0; margin: 0; }

    .field-list li {
      padding: 6px 0 6px 16px;
      border-bottom: 1px solid #12151f;
      color: #c0c0c0;
      font-size: 0.9rem;
      position: relative;
      line-height: 1.5;
    }

    .field-list li:before {
      content: '›';
      position: absolute;
      left: 0;
      color: #a78bfa;
    }

    .field-list li:last-child { border-bottom: none; }

    .evidence-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .evidence-block {
      background: #12151f;
      border-radius: 8px;
      padding: 12px;
    }

    .evidence-block-title {
      font-size: 0.75rem;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .ioc-item {
      font-family: monospace;
      font-size: 0.8rem;
      color: #22c55e;
      padding: 2px 0;
      word-break: break-all;
      line-height: 1.5;
    }

    .mitre-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .mitre-tag {
      background: rgba(167, 139, 250, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #a78bfa;
      font-family: monospace;
    }

    .actor-tag {
      display: inline-block;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.85rem;
      color: #f59e0b;
      margin: 4px;
    }

    .rec-list {
      list-style: none;
      padding: 0;
      counter-reset: rec-counter;
    }

    .rec-list li {
      counter-increment: rec-counter;
      padding: 8px 8px 8px 36px;
      border-bottom: 1px solid #12151f;
      color: #c0c0c0;
      font-size: 0.9rem;
      line-height: 1.5;
      position: relative;
    }

    .rec-list li:before {
      content: counter(rec-counter);
      position: absolute;
      left: 8px;
      top: 8px;
      background: #a78bfa;
      color: #0f1117;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .rec-list li:last-child { border-bottom: none; }

    .rec-section { margin-bottom: 16px; }

    .rec-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .rec-section-title.critical-rec {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .rec-section-title.high-rec {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .rec-section-title.medium-rec {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .rec-section-title.ongoing-rec {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .risk-divider {
      border: none;
      border-top: 1px solid #2a2d3a;
      margin: 8px 0 16px 0;
    }

    .history-section { margin-top: 24px; }

    .history-section h3 {
      color: #888;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .history-item {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
    }

    .history-item:hover { border-color: #555; color: #aaa; }

    @media (max-width: 600px) {
      .exec-grid { grid-template-columns: 1fr; }
      .evidence-grid { grid-template-columns: 1fr; }
      .risk-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- PASSWORD SCREEN -->
  <div id="password-screen">
    <div class="password-card">
      <h2>🛡️🤖 Agentic Intelligence Agent's Live Output 🔎📊</h2>
      <p>Enter your access password to continue</p>
      <input
        type="password"
        id="password-input"
        class="password-input"
        placeholder="Password"
        autocomplete="current-password"
      />
      <button class="password-btn" onclick="checkPassword()">
        Access Dashboard
      </button>
      <div id="password-error" class="password-error">
        Incorrect password. Please try again.
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <header>
      <h1>🛡️🤖 Agentic Intelligence Agent's Live Output 🔎📊</h1>
      <div class="header-right">
        <div id="status-indicator">
          <div id="status-dot"></div>
          <span id="status-text">Connecting...</span>
        </div>
        <button id="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <div id="timestamp">Waiting for first update...</div>

    <div id="output-container">
      <div id="output-content">
        <p style="color:#444; text-align:center; padding:60px 0">
          ⏳ Waiting for agent output...
        </p>
      </div>
    </div>

    <div class="history-section">
      <h3>Previous Updates</h3>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
  const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const outputContent = document.getElementById('output-content');
    const outputContainer = document.getElementById('output-container');
    const timestampEl = document.getElementById('timestamp');
    const historyList = document.getElementById('history-list');
    let updateHistory = [];
    let ablyInitialized = false;

    // ============================================================
    // PASSWORD PROTECTION — server side, no password in this file
    // ============================================================

    async function checkPassword() {
      const input = document.getElementById('password-input').value;
      const error = document.getElementById('password-error');
      const btn = document.querySelector('.password-btn');

      if (!input) return;

      btn.textContent = 'Checking...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          sessionStorage.setItem('authenticated', 'true');
          document.getElementById('password-screen').classList.add('hidden');
          document.getElementById('app').classList.add('visible');
          error.classList.remove('visible');
          initApp();
        } else {
          error.textContent = 'Incorrect password. Please try again.';
          error.classList.add('visible');
          document.getElementById('password-input').value = '';
          document.getElementById('password-input').focus();
        }
      } catch (err) {
        error.textContent = 'Connection error. Please try again.';
        error.classList.add('visible');
      } finally {
        btn.textContent = 'Access Dashboard';
        btn.disabled = false;
      }
    }

    function logout() {
      sessionStorage.removeItem('authenticated');
      document.getElementById('password-screen').classList.remove('hidden');
      document.getElementById('app').classList.remove('visible');
      document.getElementById('password-input').value = '';
    }

    // Allow Enter key to submit password
    document.getElementById('password-input')
      .addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
      });

    // Check if already authenticated (page refresh)
    if (sessionStorage.getItem('authenticated') === 'true') {
      document.getElementById('password-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      initApp();
    }

    // ============================================================
    // HELPER FUNCTIONS
    // ============================================================

    function getRatingClass(rating) {
      if (!rating) return '';
      const r = rating.toLowerCase();
      if (r.includes('critical')) return 'critical';
      if (r.includes('high')) return 'high';
      if (r.includes('medium')) return 'medium';
      if (r.includes('low')) return 'low';
      return '';
    }

    function toArray(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'string') return [val];
      if (typeof val === 'object') return Object.values(val);
      return [val];
    }

    function renderList(items) {
      const arr = toArray(items);
      if (!arr.length) return '<p class="field-value">None identified</p>';
      return `<ul class="field-list">
        ${arr.map(item => {
          const text = typeof item === 'object'
            ? JSON.stringify(item) : item;
          return `<li>${text}</li>`;
        }).join('')}
      </ul>`;
    }

    function renderMitre(mitre) {
      if (!mitre) return '<p class="field-value">None identified</p>';

      if (Array.isArray(mitre)) {
        if (mitre.length > 0 && typeof mitre[0] === 'object') {
          let html = '';
          mitre.forEach(item => {
            if (item.tactic) {
              html += `
                <div style="margin-bottom:12px;">
                  <div style="color:#ffffff; font-size:0.85rem;
                    font-weight:700; margin-bottom:6px;">
                    ${item.tactic}
                  </div>
                  <div class="mitre-grid">
                    ${toArray(item.techniques).map(t =>
                      `<span class="mitre-tag">${t}</span>`
                    ).join('')}
                  </div>
                </div>`;
            } else {
              html += `<span class="mitre-tag">
                ${JSON.stringify(item)}
              </span>`;
            }
          });
          return html;
        }
        return `<div class="mitre-grid">
          ${mitre.map(item =>
            `<span class="mitre-tag">${item}</span>`
          ).join('')}
        </div>`;
      }

      if (typeof mitre === 'object') {
        return `<div class="mitre-grid">
          ${Object.entries(mitre).map(([k, v]) =>
            `<span class="mitre-tag">${k}: ${v}</span>`
          ).join('')}
        </div>`;
      }

      return `<div class="mitre-grid">
        ${String(mitre).split(',').map(s =>
          `<span class="mitre-tag">${s.trim()}</span>`
        ).join('')}
      </div>`;
    }

    function renderEvidence(evidence) {
      if (!evidence) return '<p class="field-value">No evidence provided</p>';
      if (typeof evidence === 'string') {
        return `<p class="field-value">${evidence}</p>`;
      }
      let html = '<div class="evidence-grid">';
      for (const [key, value] of Object.entries(evidence)) {
        if (!value || (Array.isArray(value) && !value.length)) continue;
        const label = key
          .replace(/_/g, ' ')
          .replace(/^./, s => s.toUpperCase());
        const items = toArray(value);
        html += `
          <div class="evidence-block">
            <div class="evidence-block-title">${label}</div>
            ${items.map(item =>
              `<div class="ioc-item">${item}</div>`
            ).join('')}
          </div>`;
      }
      html += '</div>';
      return html;
    }

    function renderThreatActors(actors) {
      const arr = toArray(actors);
      if (!arr.length) return '<p class="field-value">None identified</p>';
      return arr.map(a =>
        `<span class="actor-tag">🎭 ${a}</span>`
      ).join('');
    }

    function renderRecommendations(recs) {
      const arr = toArray(recs);
      if (!arr.length) return '<p class="field-value">None provided</p>';
      return `<ol class="rec-list">
        ${arr.map(item => `<li>${item}</li>`).join('')}
      </ol>`;
    }

    function renderRecommendedActions(actions) {
      if (!actions) return '';
      if (Array.isArray(actions)) return renderRecommendations(actions);

      const sections = [
        {
          key: 'immediate_24_48_hours',
          label: '🔴 Immediate (24-48 Hours)',
          cls: 'critical-rec'
        },
        {
          key: 'immediate_critical_24_48_hours',
          label: '🔴 Immediate Critical (24-48 Hours)',
          cls: 'critical-rec'
        },
        {
          key: 'high_priority_7_days',
          label: '🟡 High Priority (7 Days)',
          cls: 'high-rec'
        },
        {
          key: 'medium_priority_30_days',
          label: '🔵 Medium Priority (30 Days)',
          cls: 'medium-rec'
        },
        {
          key: 'ongoing_continuous',
          label: '🟢 Ongoing / Continuous',
          cls: 'ongoing-rec'
        },
      ];

      let html = '';
      sections.forEach(({ key, label, cls }) => {
        const items = toArray(actions[key]);
        if (!items.length) return;
        html += `
          <div class="rec-section">
            <div class="rec-section-title ${cls}">${label}</div>
            <ol class="rec-list">
              ${items.map(item => `<li>${item}</li>`).join('')}
            </ol>
          </div>`;
      });

      const handledKeys = sections.map(s => s.key);
      Object.entries(actions).forEach(([key, value]) => {
        if (handledKeys.includes(key)) return;
        const label = key
          .replace(/_/g, ' ')
          .replace(/^./, s => s.toUpperCase());
        const items = toArray(value);
        if (!items.length) return;
        html += `
          <div class="rec-section">
            <div class="rec-section-title">${label}</div>
            <ol class="rec-list">
              ${items.map(item => `<li>${item}</li>`).join('')}
            </ol>
          </div>`;
      });

      return html;
    }

    function renderPriorityRisks(risks) {
      const arr = toArray(risks);
      if (!arr.length) return '';
      return `<ul class="priority-list">
        ${arr.map(item => {
          const text = typeof item === 'string'
            ? item : JSON.stringify(item);
          const ratingClass = getRatingClass(text);
          return `<li class="priority-item ${ratingClass}">${text}</li>`;
        }).join('')}
      </ul>`;
    }
    function formatDateTime(val) {
      if (!val) return 'N/A';

      // Already has UTC label — use as is
      if (typeof val === 'string' && 
          (val.includes('UTC') || val.includes('utc'))) {
        return val;
      }

      // ISO format like 2026-03-25T17:27:28Z
      if (typeof val === 'string' && val.includes('T')) {
        try {
          const clean = val.replace('Z', '');
          const parts = clean.split('T');
          const date = parts[0];
          const time = parts[1] || '00:00:00';
          // If midnight — Claude didn't set a real time
          if (time === '00:00:00' || time === '00:00:00.000') {
            return `${date} (time not specified)`;
          }
          // Trim milliseconds if present
          const timeClean = time.split('.')[0];
          return `${date} ${timeClean} UTC`;
        } catch {
          return val;
        }
      }

      // Just a date like 2026-03-25
      if (typeof val === 'string' && 
          /^\d{4}-\d{2}-\d{2}$/.test(val.trim())) {
        return `${val.trim()} (time not specified)`;
      }

      return val;
    }

    function renderExecutiveSummary(exec) {
      if (!exec) return '';
      // Format datetime — add time if only date provided

    const timestamp = formatDateTime(
      exec.analysis_timestamp ||
      exec.analysis_date ||
      exec.analysis_date_time ||
      exec.timestamp ||
      exec.report_date || ''
    );
    const published = formatDateTime(
      exec.report_published ||
      exec.published ||
      exec.date_published ||
      exec.report_time || ''
    );
      const overview = exec.overview ||
                       exec.summary ||
                       exec.description || '';
      const priorities = exec.highest_priority_risks ||
                         exec.priority_risks ||
                         exec.priorities || [];
      const keyFindings = exec.key_findings ||
                          exec.findings || [];

      return `
        <div class="section-card">
          <div class="section-title">📋 Executive Summary</div>
          <div class="exec-grid">
            <div class="exec-meta">
              <div class="exec-meta-label">Analysis Date</div>
              <div class="exec-meta-value">${timestamp || 'N/A'}</div>
            </div>
            <div class="exec-meta">
              <div class="exec-meta-label">Report Published</div>
              <div class="exec-meta-value">${published || 'N/A'}</div>
            </div>
          </div>
          ${overview ? `
            <div class="field-label">Overview</div>
            <p class="overview-text">${overview}</p>
          ` : ''}
          ${toArray(priorities).length ? `
            <div class="field-label">Highest Priority Risks</div>
            ${renderPriorityRisks(priorities)}
          ` : ''}
          ${toArray(keyFindings).length ? `
            <div class="field-label">Key Findings</div>
            ${renderList(keyFindings)}
          ` : ''}
        </div>`;
    }

    function renderRiskFinding(risk, index) {
      const title = risk.risk_title ||
                    risk.title ||
                    `Risk Finding ${index + 1}`;
      const rating = risk.rating ||
                     risk.severity ||
                     risk.risk_rating || '';
      const ratingClass = getRatingClass(rating);
      const description = risk.description || risk.details || '';
      const actors = risk.threat_actors ||
                     risk.threat_actor ||
                     risk.actors ||
                     risk.adversaries || [];
      const mitre = risk.mitre_attack ||
                    risk.mitre ||
                    risk.mitre_attack_techniques ||
                    risk.attack_techniques || [];
      const evidence = risk.evidence || risk.indicators || null;
      const impact = risk.organizational_impact || risk.impact || '';
      const recs = risk.recommendations || risk.remediation || [];

      return `
        <div class="risk-card">
          <div class="risk-header">
            <div class="risk-title">⚠️ ${title}</div>
            ${rating ? `
              <span class="rating-badge rating-${ratingClass}">
                ${rating}
              </span>` : ''}
          </div>
          <hr class="risk-divider"/>
          ${toArray(actors).length ? `
            <div class="field-label">🎭 Threat Actors</div>
            <div style="margin-bottom:8px">
              ${renderThreatActors(actors)}
            </div>
          ` : ''}
          ${description ? `
            <div class="field-label">📝 Description</div>
            <p class="field-value" style="margin-bottom:8px">
              ${description}
            </p>
          ` : ''}
          ${toArray(mitre).length ? `
            <div class="field-label">🎯 MITRE ATT&CK</div>
            <div style="margin-bottom:8px">${renderMitre(mitre)}</div>
          ` : ''}
          ${evidence ? `
            <div class="field-label">🔬 Evidence</div>
            <div style="margin-bottom:8px">
              ${renderEvidence(evidence)}
            </div>
          ` : ''}
          ${impact ? `
            <div class="field-label">💥 Organizational Impact</div>
            <p class="field-value" style="margin-bottom:8px">
              ${impact}
            </p>
          ` : ''}
          ${toArray(recs).length ? `
            <div class="field-label">✅ Recommendations</div>
            ${renderRecommendations(recs)}
          ` : ''}
        </div>`;
    }

    function renderReport(data) {
      let html = '';

      const execKey = [
        'executive_summary', 'exec_summary', 'summary'
      ].find(k => data[k]);
      if (execKey) html += renderExecutiveSummary(data[execKey]);

      const riskKey = [
        'risk_findings', 'risks', 'findings', 'risk_assessment'
      ].find(k => data[k] && toArray(data[k]).length);
      if (riskKey) {
        const risks = toArray(data[riskKey]);
        html += `
          <div class="section-card">
            <div class="section-title">
              🚨 Risk Findings (${risks.length})
            </div>
            ${risks.map((r, i) => renderRiskFinding(r, i)).join('')}
          </div>`;
      }

      const actorKey = [
        'threat_actors', 'adversaries', 'actors'
      ].find(k => data[k] && toArray(data[k]).length);
      if (actorKey) {
        html += `
          <div class="section-card">
            <div class="section-title">🎭 Threat Actors</div>
            <div>${renderThreatActors(data[actorKey])}</div>
          </div>`;
      }

      const mitreKey = [
        'mitre_attack_summary', 'mitre_attack',
        'mitre', 'attack_summary'
      ].find(k => data[k] && toArray(data[k]).length);
      if (mitreKey) {
        html += `
          <div class="section-card">
            <div class="section-title">🎯 MITRE ATT&CK Summary</div>
            ${renderMitre(data[mitreKey])}
          </div>`;
      }

      const actionKey = [
        'recommended_actions', 'recommendations', 'action_plan'
      ].find(k => data[k]);
      if (actionKey) {
        html += `
          <div class="section-card">
            <div class="section-title">✅ Recommended Actions</div>
            ${renderRecommendedActions(data[actionKey])}
          </div>`;
      }

      const iocKey = [
        'indicators_of_compromise', 'iocs', 'indicators'
      ].find(k => data[k]);
      if (iocKey) {
        html += `
          <div class="section-card">
            <div class="section-title">
              🔬 Indicators of Compromise
            </div>
            ${renderEvidence(data[iocKey])}
          </div>`;
      }

      const metaKey = [
        'assessment_metadata', 'metadata', 'report_metadata'
      ].find(k => data[k]);
      if (metaKey) {
        const meta = data[metaKey];
        html += `
          <div class="section-card">
            <div class="section-title">📊 Assessment Metadata</div>`;
        for (const [key, value] of Object.entries(meta)) {
          const label = key
            .replace(/_/g, ' ')
            .replace(/^./, s => s.toUpperCase());
          html += `<div class="field-label">${label}</div>`;
          if (Array.isArray(value)) {
            html += renderList(value);
          } else if (typeof value === 'object') {
            html += renderEvidence(value);
          } else {
            html += `<p class="field-value">${value}</p>`;
          }
        }
        html += `</div>`;
      }

      const noteKey = [
        'analyst_notes', 'notes',
        'analyst_note', 'analysis_notes'
      ].find(k => data[k]);
      if (noteKey) {
        html += `
          <div class="section-card">
            <div class="section-title">📝 Analyst Notes</div>
            <p class="overview-text">${data[noteKey]}</p>
          </div>`;
      }

      return html || '<p style="color:#444">No data to display</p>';
    }

    function displayReport(data) {
      outputContainer.classList.add('updating');
      setTimeout(() => {
        try {
          const parsed = typeof data.content === 'object'
            ? data.content
            : JSON.parse(data.content);
          outputContent.innerHTML = DOMPurify.sanitize(
            renderReport(parsed)
          );
        } catch (e) {
          outputContent.innerHTML = `
            <pre style="color:#c0c0c0; overflow-x:auto">
              ${JSON.stringify(data.content, null, 2)}
            </pre>`;
        }

        const d = new Date(data.timestamp);
        timestampEl.textContent =
          `Last updated: ${d.toLocaleTimeString()} ` +
          `on ${d.toLocaleDateString()}`;

        outputContainer.classList.remove('updating');
      }, 300);
    }

    function initApp() {
      if (ablyInitialized) return;
      ablyInitialized = true;

      fetch('/api/report')
        .then(r => r.json())
        .then(({ report }) => {
          if (report) {
            console.log('Loaded last report from storage');
            displayReport(report);
          }
        })
        .catch(err => console.log('Could not load last report:', err));

      const ably = new Ably.Realtime({ authUrl: '/api/auth' });
      const channel = ably.channels.get('agent-channel');

      ably.connection.on('connected', () => {
        statusDot.className = 'connected';
        statusText.textContent = 'Connected — Listening for updates';
      });

      ably.connection.on('disconnected', () => {
        statusDot.className = '';
        statusText.textContent = 'Disconnected';
      });

      ably.connection.on('failed', () => {
        statusDot.className = 'error';
        statusText.textContent = 'Connection error';
      });

      channel.subscribe('agent-update', (message) => {
        let data = message.data;
        if (typeof data === 'string') {
          try { data = JSON.parse(data); } catch (e) { return; }
        }

        statusDot.className = 'receiving';
        statusText.textContent = 'Receiving update...';

        if (outputContent.innerText.trim() &&
            !outputContent.innerText.includes('Waiting')) {
          updateHistory.unshift({
            timestamp: timestampEl.textContent,
            preview: outputContent.innerText.substring(0, 80) + '...'
          });
          if (updateHistory.length > 5) updateHistory.pop();
          renderHistory();
        }

        displayReport(data);

        setTimeout(() => {
          statusDot.className = 'connected';
          statusText.textContent = 'Connected — Listening for updates';
        }, 600);
      });
    }

    function renderHistory() {
      historyList.innerHTML = updateHistory.map(item => `
        <div class="history-item">
          <strong>${item.timestamp}</strong><br/>
          ${item.preview}
        </div>
      `).join('');
    }  
  </script>

</body>
</html>
